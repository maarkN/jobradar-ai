# Qdrant for real runs. Tests use qdrant-client's in-process local mode, so this
# is only needed when you index a real corpus. Point the app at it with
# QDRANT_URL=http://127.0.0.1:6333 in your .env.
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
