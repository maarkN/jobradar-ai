# Full stack: the API + Qdrant. `docker compose up` then hit http://localhost:8000.
# Tests don't need this (qdrant-client runs in-process local mode).
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
    env_file:
      - .env
    depends_on:
      - qdrant
    command: ["jobradar", "serve", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  qdrant_data:
