name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: ruff
        run: uv run ruff check .
      - name: mypy
        run: uv run mypy
      - name: pytest (offline, LLM mocked)
        run: uv run pytest
